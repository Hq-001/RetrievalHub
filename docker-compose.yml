# RetrievalHub Docker Compose
version: "3.8"

services:
  retrievalhub:
    build: .
    container_name: retrievalhub
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - lancedb_data:/app/data/lancedb
      - sqlite_data:/app/data/metadata.db
      - originals_data:/app/data/originals
    env_file:
      - .env
    environment:
      - REST_HOST=0.0.0.0
      - REST_PORT=8000
      - MCP_TRANSPORT=sse
      - MCP_SSE_PORT=8001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  lancedb_data:
  sqlite_data:
  originals_data:
